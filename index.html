<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Cinema</title>
    <style>
        /* Thiết lập hình nền rạp phim toàn màn hình */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            background: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1920&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
        }

        /* Lớp phủ màu đen mờ để làm nổi bật khung đăng nhập */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        /* Thiết kế khung đăng nhập */
        .login-card { 
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 40px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            width: 350px; 
            text-align: center;
        }

        h2 { 
            color: #ffffff; 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .icon { font-size: 40px; margin-bottom: -10px; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            background: rgba(255, 255, 255, 0.85);
            border: none; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            background: #ffffff;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(to right, #e50914, #b81d24); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.6);
        }

        .footer-text { 
            margin-top: 25px; 
            font-size: 12px; 
            color: #cccccc; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="login-card">
        <div class="icon">🎬</div>
        <h2>CINEMA LOGIN</h2>
        <input type="text" id="user" placeholder="Tên đăng nhập (admin / staff / kh_...)">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button onclick="handleLogin()">ĐĂNG NHẬP</button>
        <div class="footer-text">Hệ Thống Quản Lý Rạp Chiếu Phim V2.0</div>
    </div>

    <script>
    // ==============================================================
    // 1. TÍNH NĂNG: BẮT SỰ KIỆN NHẤN PHÍM ENTER ĐỂ ĐĂNG NHẬP
    // ==============================================================
    document.addEventListener("DOMContentLoaded", function() {
        const userInput = document.getElementById('user');
        const passInput = document.getElementById('pass');

        function handleEnterKey(event) {
            if (event.key === "Enter") {
                handleLogin(); 
            }
        }

        userInput.addEventListener("keypress", handleEnterKey);
        passInput.addEventListener("keypress", handleEnterKey);
    });

    // ==============================================================
    // 2. TÍNH NĂNG: XỬ LÝ ĐĂNG NHẬP (ĐỌC TỪ FILE NGUOIDUNG.JSON)
    // ==============================================================
    async function handleLogin() {
        const username = document.getElementById('user').value.trim();
        const password = document.getElementById('pass').value.trim();

        if (!username || !password) {
            alert("Vui lòng nhập đầy đủ tài khoản và mật khẩu!");
            return;
        }

        try {
            // Đọc dữ liệu từ file nguoidung.json
            const response = await fetch('./nguoidung.json');
            if (!response.ok) throw new Error("Không tìm thấy file nguoidung.json");
            const data = await response.json();

            let loggedInUser = null;
            let role = '';

            // 1. Quét tìm trong danh sách Nhân Viên (Bao gồm Admin và Staff)
            if (data.Nhan_Vien) {
                const nv = data.Nhan_Vien.find(u => u.Ten_Dang_Nhap === username && u.Mat_Khau === password);
                if (nv) {
                    loggedInUser = nv;
                    role = nv.Vai_Tro; // Lấy chức danh ("Quản lý" hoặc "Nhân viên")
                }
            }

            // 2. Nếu không phải nhân viên, quét tiếp trong danh sách Khách Hàng
            if (!loggedInUser && data.Khach_Hang) {
                const kh = data.Khach_Hang.find(u => u.Ten_Dang_Nhap === username && u.Mat_Khau === password);
                if (kh) {
                    loggedInUser = kh;
                    role = "Khách hàng"; // Mặc định gán vai trò Khách hàng
                }
            }

            // 3. Xử lý logic rẽ nhánh sau khi tìm thấy User
            if (loggedInUser) {
                // Lưu thông tin vào bộ nhớ trình duyệt
                localStorage.setItem('cinema_user', loggedInUser.Ho_Ten);
                localStorage.setItem('cinema_username', loggedInUser.Ten_Dang_Nhap); 
                localStorage.setItem('userRole', role);
                
                // Rẽ nhánh tới đúng trang làm việc
                if (role === "Quản lý") {
                    alert("Đăng nhập thành công! Xin chào Quản lý " + loggedInUser.Ho_Ten);
                    window.location.href = 'admin.html';
                } else if (role === "Nhân viên") {
                    alert("Đăng nhập thành công! Xin chào Nhân viên " + loggedInUser.Ho_Ten);
                    window.location.href = 'staff.html';
                } else {
                    alert("Đăng nhập thành công! Chào mừng " + loggedInUser.Ho_Ten);
                    window.location.href = 'user.html';
                }
            } else {
                // Nhập sai tài khoản hoặc mật khẩu
                alert("Tên đăng nhập hoặc mật khẩu không chính xác!");
            }

        } catch (error) {
            console.error("Lỗi khi đăng nhập:", error);
            // Phương án dự phòng (Fallback) nếu chạy code không qua Live Server bị lỗi CORS
            if (username === 'admin' && password === '123456') {
                localStorage.setItem('cinema_user', 'Admin Khẩn Cấp');
                localStorage.setItem('cinema_username', 'admin'); 
                localStorage.setItem('userRole', 'Quản lý');
                window.location.href = 'admin.html';
            } else {
                alert("Lỗi hệ thống: Không thể kết nối cơ sở dữ liệu. Vui lòng chạy trang trên Live Server!");
            }
        }
    }
    </script>
</body>
</html>
